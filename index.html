<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitClub • July Summer Special</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
    width:100%;
    height:100%;
    font-family:'Montserrat',sans-serif;
}

.banner{
    position:relative;
    width:100%;
    height:350px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

/* Background */

.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 80% 15%,rgba(255,214,10,.45),transparent 30%),
    radial-gradient(circle at 10% 90%,rgba(34,197,94,.30),transparent 35%),
    linear-gradient(135deg,#0096d6,#0086b3 45%,#0c7660);
    animation:drift 18s ease-in-out infinite alternate;
}

@keyframes drift{
from{background-position:0 0}
to{background-position:100px -50px}
}

/* Floating icons */

.float{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.item{
    position:absolute;
    top:-10%;
    opacity:.18;
    animation:fall linear infinite;
    font-size:20px;
}

@keyframes fall{
from{transform:translateY(0) rotate(0deg)}
to{transform:translateY(115vh) rotate(360deg)}
}

.content{
    position:relative;
    z-index:2;
    width:min(94%,900px);
}

.kicker{
    font-size:.8rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:#fff9c4;
    margin-bottom:10px;
}

h1{
    font-size:clamp(1.8rem,5vw,3rem);
    line-height:1.05;
    margin-bottom:18px;
    text-shadow:0 4px 18px rgba(0,0,0,.45);
}

.gold{
    color:#ffd54f;
}

.card{
    display:inline-block;
    padding:18px 28px;
    border-radius:18px;
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.price{
    font-size:clamp(2rem,6vw,3.25rem);
    color:#ffd54f;
    margin-bottom:8px;
}

.line{
    font-size:1.05rem;
    margin:6px 0;
}

.tag{
    display:inline-block;
    margin-top:14px;
    background:#f59e0b;
    color:white;
    padding:7px 16px;
    border-radius:999px;
    font-size:.8rem;
    letter-spacing:.12em;
    text-transform:uppercase;
}
</style>

</head>

<body>

<div class="banner">

<div class="bg"></div>

<div class="float" id="float"></div>

<div class="content">

<div class="kicker">
JULY SUMMER SPECIAL
</div>

<h1>
Make This Your <span class="gold">Strongest Summer Yet</span>
</h1>

<div class="card">

<div class="price">
$19.99 Down
</div>

<div class="line">
No Monthly Dues Until <strong>July 31st</strong>
</div>

<div class="line">
☀️ Join Today. Train All Summer.
</div>

<div class="tag">
Limited Time
</div>

</div>

</div>

</div>

<script>

const icons=["☀️","🌴","🏖️","😎","✨"];

const container=document.getElementById("float");

for(let i=0;i<45;i++){

const e=document.createElement("div");

e.className="item";

e.textContent=icons[Math.floor(Math.random()*icons.length)];

e.style.left=Math.random()*100+"%";

e.style.animationDuration=(8+Math.random()*8)+"s";

e.style.animationDelay=(Math.random()*10)+"s";

container.appendChild(e);

}

</script>

</body>
</html>
