<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitClub • March Kickoff</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Montserrat',sans-serif}

    .banner-container{
      position:relative;
      width:100%;
      min-height:100vh;min-height:100svh;min-height:100dvh;
      display:flex;justify-content:center;align-items:center;text-align:center;
      overflow:hidden;color:#ffffff;
      padding:clamp(16px,3vw,40px);
    }

    /* Fresh March gradient (early spring energy) */
    .banner-background{
      position:absolute;inset:0;z-index:0;
      background:
        radial-gradient(900px 600px at 20% 15%, rgba(34,197,94,.35) 0%, rgba(34,197,94,0) 60%),
        radial-gradient(900px 600px at 80% 85%, rgba(59,130,246,.30) 0%, rgba(59,130,246,0) 60%),
        linear-gradient(135deg,#0f172a 0%, #134e4a 50%, #0f172a 100%);
      background-size:120% 120%,120% 120%,100% 100%;
      animation:bgshift 28s ease-in-out infinite alternate;
    }

    @keyframes bgshift{
      0%{background-position:0% 0%,100% 100%,0% 0%}
      100%{background-position:20% 20%,80% 80%,100% 100%}
    }

    /* Subtle upward motion particles */
    .particles{position:absolute;inset:0;pointer-events:none;z-index:1}
    .particle{
      position:absolute;
      bottom:-10%;
      width:6px;height:6px;
      border-radius:50%;
      background:#4ade80;
      opacity:.25;
      animation:rise linear infinite;
    }

    @keyframes rise{
      0%{transform:translateY(0)}
      100%{transform:translateY(-110vh)}
    }

    .banner-content{
      position:relative;
      z-index:2;
      width:min(95vw, 1000px);
      margin:auto;
    }

    .kicker{
      font-size:clamp(.85rem,2vw,1rem);
      letter-spacing:.35em;
      text-transform:uppercase;
      color:#bbf7d0;
      margin-bottom:.6em;
    }

    .main-message{
      font-size:clamp(2.3rem,6vw,4rem);
      line-height:1.05;
      margin-bottom:.5em;
      text-shadow:0 10px 28px rgba(0,0,0,.65);
    }

    .accent{
      background:linear-gradient(90deg,#86efac,#4ade80,#86efac);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .card{
      display:inline-block;
      padding:clamp(20px,3vw,34px);
      border-radius:18px;
      background:rgba(0,0,0,.45);
      border:2px solid rgba(255,255,255,.20);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      max-width:min(92vw,820px);
    }

    .highlights{
      font-size:clamp(1.1rem,2.4vw,1.6rem);
      line-height:1.6;
    }

    .highlights div{
      margin:.6em 0;
      text-shadow:0 2px 12px rgba(0,0,0,.7);
    }

    .price{
      font-size:clamp(2.6rem,5vw,3.6rem);
      font-weight:900;
      margin:.2em 0;
      color:#4ade80;
      text-shadow:0 8px 18px rgba(0,0,0,.6);
    }

    @media (prefers-reduced-motion: reduce){
      .banner-background{animation:none}
      .particle{animation:none}
    }
  </style>
</head>
<body>
  <div class="banner-container">
    <div class="banner-background"></div>
    <div class="particles" aria-hidden="true"></div>

    <div class="banner-content">
      <div class="kicker">March Kickoff • Starts Today</div>
      <h1 class="main-message">Spring Into <span class="accent">Stronger</span></h1>

      <div class="card">
        <div class="highlights">
          <div class="price">$49 Down</div>
          <div>No dues until <strong>March 31st</strong></div>
          <div>Start now. Build momentum before summer.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const particles=document.querySelector('.particles');
    for(let i=0;i<70;i++){
      const p=document.createElement('span');
      p.className='particle';
      p.style.left=Math.random()*100+'%';
      p.style.animationDuration=(10+Math.random()*10)+'s';
      p.style.animationDelay=(Math.random()*10)+'s';
      particles.appendChild(p);
    }
  </script>
</body>
</html>
