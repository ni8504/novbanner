<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitClub • 250th Independence Day Special</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Montserrat',sans-serif}

    .banner-container{
      position:relative;
      width:100%;
      height:350px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      color:#fff;
      padding:clamp(8px,2vw,16px);
    }

    .banner-background{
      position:absolute;
      inset:0;
      z-index:0;
      background:
        radial-gradient(700px 400px at 15% 20%, rgba(220,38,38,.55) 0%, rgba(220,38,38,0) 60%),
        radial-gradient(700px 400px at 85% 25%, rgba(37,99,235,.50) 0%, rgba(37,99,235,0) 60%),
        radial-gradient(800px 500px at 50% 100%, rgba(250,204,21,.22) 0%, rgba(250,204,21,0) 60%),
        linear-gradient(135deg,#06152f 0%, #123c7c 48%, #111827 100%);
      background-size:120% 120%,120% 120%,120% 120%,100% 100%;
      animation:bgshift 24s ease-in-out infinite alternate;
    }

    @keyframes bgshift{
      0%{background-position:0% 0%,100% 100%,50% 100%,0% 0%}
      100%{background-position:18% 18%,82% 82%,45% 90%,100% 100%}
    }

    .banner-background::after{
      content:"";
      position:absolute;
      inset:0;
      opacity:.14;
      background:
        linear-gradient(90deg, rgba(255,255,255,.16) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.12) 1px, transparent 1px);
      background-size:22px 22px;
      mix-blend-mode:screen;
    }

    .bursts{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .burst{
      position:absolute;
      top:-10%;
      font-size:clamp(14px,2.2vw,24px);
      opacity:.22;
      animation:fall linear infinite;
    }

    @keyframes fall{
      0%{transform:translateY(0) rotate(0deg)}
      100%{transform:translateY(115vh) rotate(360deg)}
    }

    .banner-content{
      position:relative;
      z-index:2;
      width:min(96vw,1050px);
      margin:auto;
    }

    .kicker{
      display:inline-block;
      font-size:clamp(.62rem,1.8vw,.82rem);
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#0b1f3a;
      background:#fde68a;
      padding:5px 12px;
      border-radius:999px;
      margin-bottom:.45em;
      box-shadow:0 6px 16px rgba(0,0,0,.35);
    }

    .main-message{
      font-size:clamp(1.45rem,4vw,2.35rem);
      line-height:1.05;
      margin-bottom:.38em;
      text-shadow:0 8px 22px rgba(0,0,0,.65);
    }

    .accent{
      background:linear-gradient(90deg,#ffffff,#fde68a,#ffffff);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .card{
      display:inline-block;
      padding:clamp(10px,2vw,18px);
      border-radius:16px;
      background:rgba(0,0,0,.46);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 12px 34px rgba(0,0,0,.55);
      max-width:96%;
    }

    .highlights{
      font-size:clamp(.88rem,2.35vw,1.18rem);
      line-height:1.35;
    }

    .highlights div{
      margin:.42em 0;
      text-shadow:0 2px 12px rgba(0,0,0,.75);
    }

    .price{
      font-size:clamp(1.9rem,4.4vw,2.95rem);
      font-weight:900;
      margin:.05em 0;
      color:#fde68a;
      text-shadow:0 7px 16px rgba(0,0,0,.7);
    }

    .badge{
      display:inline-block;
      margin-top:7px;
      padding:5px 13px;
      border-radius:999px;
      background:#dc2626;
      border:1px solid rgba(255,255,255,.28);
      font-size:clamp(.65rem,1.8vw,.9rem);
      letter-spacing:.12em;
      text-transform:uppercase;
      box-shadow:0 6px 14px rgba(0,0,0,.42);
    }

    @media (max-width:520px){
      .highlights div:nth-child(4){display:none}
    }

    @media (prefers-reduced-motion: reduce){
      .banner-background{animation:none}
      .burst{animation:none}
    }
  </style>
</head>

<body>
  <div class="banner-container">
    <div class="banner-background"></div>
    <div class="bursts" aria-hidden="true"></div>

    <div class="banner-content">
      <div class="kicker">America’s 250th • Semiquincentennial Sale</div>

      <h1 class="main-message">
        Freedom Sale: <span class="accent">No Contract</span>
      </h1>

      <div class="card">
        <div class="highlights">
          <div class="price">$2.50 to Join</div>
          <div>Declare your independence from long-term contracts</div>
          <div>250 years deserves a once-in-a-generation deal</div>
          <div>Start strong. Stay free. Train at FitClub.</div>
        </div>
        <div class="badge">July 4th Special</div>
      </div>
    </div>
  </div>

  <script>
    const bursts = document.querySelector('.bursts');
    const icons = ['⭐','✨','🎆','🎇'];

    for(let i = 0; i < 55; i++){
      const b = document.createElement('span');
      b.className = 'burst';
      b.textContent = icons[Math.floor(Math.random() * icons.length)];
      b.style.left = Math.random() * 100 + '%';
      b.style.animationDuration = (8 + Math.random() * 10) + 's';
      b.style.animationDelay = (Math.random() * 10) + 's';
      bursts.appendChild(b);
    }
  </script>
</body>
</html>
