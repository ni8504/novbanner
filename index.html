<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitClub • Spring Special</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Montserrat',sans-serif}

    .banner-container{
      position:relative;
      width:100%;
      height:350px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      color:#ffffff;
      padding:clamp(8px,2vw,16px);
    }

    /* Bright spring gradient */
    .banner-background{
      position:absolute;inset:0;z-index:0;
      background:
        radial-gradient(900px 600px at 18% 15%, rgba(134,239,172,.45) 0%, rgba(134,239,172,0) 60%),
        radial-gradient(900px 600px at 82% 85%, rgba(56,189,248,.30) 0%, rgba(56,189,248,0) 60%),
        linear-gradient(135deg,#14532d 0%, #0f766e 50%, #14532d 100%);
      background-size:120% 120%,120% 120%,100% 100%;
      animation:bgshift 28s ease-in-out infinite alternate;
    }
    @keyframes bgshift{0%{background-position:0% 0%,100% 100%,0% 0%}100%{background-position:20% 20%,80% 80%,100% 100%}}

    /* Floating blossoms / leaves */
    .springbits{position:absolute;inset:0;pointer-events:none;z-index:1}
    .springbit{
      position:absolute;top:-10%;
      font-size:clamp(14px,2.2vw,24px);
      opacity:.18;
      animation:fall linear infinite;
    }
    @keyframes fall{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(115vh) rotate(360deg)}}

    .banner-content{position:relative;z-index:2;width:min(95vw,1000px);margin:auto}

    .kicker{
      font-size:clamp(.65rem,1.8vw,.8rem);
      letter-spacing:.25em;
      text-transform:uppercase;
      color:#dcfce7;
      margin-bottom:.4em;
    }

    .main-message{
      font-size:clamp(1.4rem,4vw,2.2rem);
      line-height:1.1;
      margin-bottom:.4em;
      text-shadow:0 6px 18px rgba(0,0,0,.6);
    }

    .accent{
      background:linear-gradient(90deg,#bbf7d0,#86efac,#bbf7d0);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }

    .card{
      display:inline-block;
      padding:clamp(10px,2vw,18px);
      border-radius:14px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 10px 30px rgba(0,0,0,.5);
      max-width:95%;
    }

    .highlights{
      font-size:clamp(.9rem,2.5vw,1.2rem);
      line-height:1.4;
    }
    .highlights div{margin:.6em 0;text-shadow:0 2px 12px rgba(0,0,0,.7)}

    .price{
      font-size:clamp(1.8rem,4vw,2.6rem);
      font-weight:900;
      margin:.1em 0;
      color:#86efac;
      text-shadow:0 6px 14px rgba(0,0,0,.6);
    }

    @media (prefers-reduced-motion: reduce){
      .banner-background{animation:none}
      .springbit{animation:none}
    }
  </style>
</head>
<body>
  <div class="banner-container">
    <div class="banner-background"></div>
    <div class="springbits" aria-hidden="true"></div>

    <div class="banner-content">
      <div class="kicker">Spring Special</div>
      <h1 class="main-message">Step Into <span class="accent">Spring Stronger</span></h1>

      <div class="card">
        <div class="highlights">
          <div class="price">$49 to Start</div>
          <div>No dues until <strong>March 31st</strong></div>
          <div>Fresh season. Fresh start.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const springbits=document.querySelector('.springbits');
    const icons=['🌸','🍃','🌼'];
    for(let i=0;i<60;i++){
      const s=document.createElement('span');
      s.className='springbit';
      s.textContent=icons[Math.floor(Math.random()*icons.length)];
      s.style.left=Math.random()*100+'%';
      s.style.animationDuration=(8+Math.random()*10)+'s';
      s.style.animationDelay=(Math.random()*10)+'s';
      springbits.appendChild(s);
    }
  </script>
</body>
</html>
