<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitClub • Memorial Day Sale</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Montserrat',sans-serif}

    .banner-container{
      position:relative;
      width:100%;
      height:350px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      color:#ffffff;
      padding:clamp(8px,2vw,16px);
    }

    /* Memorial Day sunset gradient */
    .banner-background{
      position:absolute;inset:0;z-index:0;
      background:
        radial-gradient(700px 400px at 20% 15%, rgba(239,68,68,.38) 0%, rgba(239,68,68,0) 60%),
        radial-gradient(700px 400px at 80% 20%, rgba(59,130,246,.32) 0%, rgba(59,130,246,0) 60%),
        radial-gradient(800px 500px at 50% 100%, rgba(250,204,21,.18) 0%, rgba(250,204,21,0) 60%),
        linear-gradient(135deg,#0f172a 0%, #1e3a8a 45%, #111827 100%);
      background-size:120% 120%,120% 120%,120% 120%,100% 100%;
      animation:bgshift 22s ease-in-out infinite alternate;
    }
    @keyframes bgshift{0%{background-position:0% 0%,100% 100%,50% 100%,0% 0%}100%{background-position:20% 20%,80% 80%,45% 90%,100% 100%}}

    /* Subtle summer motion (sun/sparkle) */
    .bits{position:absolute;inset:0;pointer-events:none;z-index:1}
    .bit{
      position:absolute;top:-10%;
      font-size:clamp(14px,2.2vw,22px);
      opacity:.18;
      animation:fall linear infinite;
    }
    @keyframes fall{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(115vh) rotate(360deg)}}

    .banner-content{position:relative;z-index:2;width:min(95vw,1000px);margin:auto}

    .kicker{
      font-size:clamp(.65rem,1.8vw,.8rem);
      letter-spacing:.28em;
      text-transform:uppercase;
      color:#fde68a;
      margin-bottom:.4em;
    }

    .main-message{
      font-size:clamp(1.4rem,4vw,2.2rem);
      line-height:1.1;
      margin-bottom:.4em;
      text-shadow:0 6px 18px rgba(0,0,0,.6);
    }

    .accent{
      background:linear-gradient(90deg,#fde68a,#facc15,#fde68a);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }

    .card{
      display:inline-block;
      padding:clamp(10px,2vw,18px);
      border-radius:14px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 10px 30px rgba(0,0,0,.5);
      max-width:95%;
    }

    .highlights{
      font-size:clamp(.9rem,2.5vw,1.2rem);
      line-height:1.4;
    }
    .highlights div{margin:.5em 0;text-shadow:0 2px 12px rgba(0,0,0,.7)}

    .price{
      font-size:clamp(1.9rem,4vw,2.8rem);
      font-weight:900;
      margin:.1em 0;
      color:#fde68a;
      text-shadow:0 6px 14px rgba(0,0,0,.6);
    }

    .badge{
      display:inline-block;margin-top:8px;padding:5px 12px;border-radius:999px;
      background:#dc2626;border:1px solid rgba(255,255,255,.25);
      font-size:clamp(.7rem,1.8vw,.9rem);letter-spacing:.12em;text-transform:uppercase;
      box-shadow:0 6px 14px rgba(0,0,0,.4);
    }

    @media (prefers-reduced-motion: reduce){
      .banner-background{animation:none}
      .bit{animation:none}
    }
  </style>
</head>
<body>
  <div class="banner-container">
    <div class="banner-background"></div>
    <div class="bits" aria-hidden="true"></div>

    <div class="banner-content">
      <div class="kicker">Memorial Day Sale • One Day Only</div>
      <h1 class="main-message">Kick Off Summer <span class="accent">Stronger</span></h1>

      <div class="card">
        <div class="highlights">
          <div class="price">Only $5 to Join</div>
          <div>Your <strong>first month is FREE</strong></div>
          <div id="countdown">Sale ends in --:--:--</div>
        </div>
        
      </div>
    </div>
  </div>

  <script>
    const bits=document.querySelector('.bits');
    const icons=['⭐','✨','🇺🇸'];
    for(let i=0;i<50;i++){
      const b=document.createElement('span');
      b.className='bit';
      b.textContent=icons[Math.floor(Math.random()*icons.length)];
      b.style.left=Math.random()*100+'%';
      b.style.animationDuration=(8+Math.random()*10)+'s';
      b.style.animationDelay=(Math.random()*10)+'s';
      bits.appendChild(b);
    }
  

    // Countdown timer (Central Time)
    const countdown=document.getElementById('countdown');
    const endDate=new Date('2026-05-26T00:00:00-05:00'); // Midnight Central after Memorial Day

    function updateCountdown(){
      const now=new Date();
      const diff=endDate-now;

      if(diff<=0){
        countdown.textContent='Offer Ends Tonight';
        return;
      }

      const hours=Math.floor(diff/(1000*60*60));
      const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
      const seconds=Math.floor((diff%(1000*60))/1000);

      countdown.textContent=`Sale ends in ${hours}h ${minutes}m ${seconds}s`;
    }

    updateCountdown();
    setInterval(updateCountdown,1000);
  </script>
</body>
</html>
